<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Advanced Security{% endblock %}</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f15; 
            --container-bg: rgba(22, 28, 36, 0.7); 
            --gold-primary: #D4AF37; 
            --gold-light: #F3E5AB;
            --gold-dark: #AA8C2C;
            --text-primary: #E2E8F0;
            --text-secondary: #94A3B8;
            --border-color: rgba(212, 175, 55, 0.25);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.05), transparent 30%);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .royal-card {
            background: var(--container-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 50px 45px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .royal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
        }

        h1, h2, h3, h4, h5 {
            font-family: 'Playfair Display', serif;
            color: var(--gold-primary);
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        h4 { font-size: 1.5rem; line-height: 1.4; }
        h2 { font-size: 2rem; margin-bottom: 10px; }

        .title-divider {
            width: 60px;
            height: 2px;
            background: var(--gold-primary);
            margin: 0 auto 35px auto;
            border-radius: 2px;
            box-shadow: 0 0 10px var(--gold-primary);
        }

        .menu-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .menu-list li a {
            display: block;
            text-decoration: none;
            color: var(--text-primary);
            padding: 16px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            font-size: 1.05rem;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .menu-list li a:hover {
            background: rgba(212, 175, 55, 0.08);
            border-color: var(--border-color);
            color: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -8px rgba(212, 175, 55, 0.4);
        }

        .form-section {
            margin-bottom: 35px;
            padding-bottom: 35px;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
        }

        .form-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .section-title {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .section-title::before, .section-title::after {
            content: '';
            height: 1px;
            width: 30px;
            background: rgba(255, 255, 255, 0.15);
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            margin-bottom: 22px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--gold-primary);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 1px var(--gold-primary);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-encrypt {
            background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
            color: #111;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.25);
        }

        .btn-encrypt:hover {
            background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        .btn-decrypt {
            background: rgba(255, 255, 255, 0.03);
            color: var(--gold-primary);
            border: 1px solid var(--border-color);
        }

        .btn-decrypt:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--gold-primary);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-img {
            width: 140px;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2));
            background: white;
            padding: 10px;
            border-radius: 8px;
        }

        /* Result styling for the return strings (if rendered via template later) */
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(212, 175, 55, 0.1);
            border-left: 3px solid var(--gold-primary);
            color: var(--gold-light);
            border-radius: 0 6px 6px 0;
            font-family: monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="royal-card">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
